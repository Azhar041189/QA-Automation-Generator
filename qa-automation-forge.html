<!DOCTYPE html>
<html>

<head>
    <title>QA Automation Forge</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            max-width: 1100px;
            margin: auto;
            border-radius: 10px;
        }

        textarea,
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        pre {
            background: #111;
            color: #00ff88;
            padding: 20px;
            overflow: auto;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>QA Automation Forge</h2>

        <label>Page URL</label>
        <input id="url" />

        <label>Manual Test Steps</label>
        <textarea id="steps" rows="7"></textarea>

        <label>Tool</label>
        <select id="tool">
            <option>Selenium</option>
            <option>Playwright</option>
        </select>

        <label>Language</label>
        <select id="lang">
            <option>Java</option>
            <option>Python</option>
            <option>JavaScript</option>
            <option>TypeScript</option>
        </select>

        <button onclick="generate()">Generate Framework</button>
        <button onclick="downloadZip()">Download ZIP</button>

        <h3>Preview</h3>
        <pre id="output"></pre>

    </div>

    <script>

        let zip = new JSZip()

        function stepParser(steps) {

            let lines = steps.split("\n")
            let code = ""

            lines.forEach(s => {
                let step = s.toLowerCase()

                if (step.includes("open")) {
                    code += `await page.goto(url)\n`
                }
                else if (step.includes("username")) {
                    code += `await page.fill('#username','testuser')\n`
                }
                else if (step.includes("password")) {
                    code += `await page.fill('#password','password')\n`
                }
                else if (step.includes("click")) {
                    code += `await page.click('#login')\n`
                }
                else if (step.includes("verify")) {
                    code += `await expect(page).toHaveURL(/dashboard/)\n`
                }
            })

            return code
        }

        function generate() {

            let url = document.getElementById("url").value
            let steps = document.getElementById("steps").value
            let tool = document.getElementById("tool").value
            let lang = document.getElementById("lang").value

            zip = new JSZip()

            let preview = ""

            let parsedSteps = stepParser(steps)

            if (tool === "Playwright" && lang === "TypeScript") {

                let test = `import { test, expect } from '@playwright/test'
import { LoginPage } from '../pages/LoginPage'

test('Login Test', async ({ page }) => {

const url='${url}'
const login = new LoginPage(page)

${parsedSteps}

})
`

                let page = `import { Page } from '@playwright/test'

export class LoginPage{

constructor(private page: Page){}

username='#username'
password='#password'
loginBtn='#login'

}
`

                let screenshot = `import { Page } from '@playwright/test'

export async function capture(page:Page,name:string){

await page.screenshot({path:'reports/'+name+'.png'})

}
`

                let config = `import { defineConfig } from '@playwright/test'

export default defineConfig({

testDir:'./tests',

retries:1,

use:{
headless:false,
screenshot:'only-on-failure'
},

reporter:[
['list'],
['allure-playwright']
]

})
`

                let packagejson = `{
"name":"qa-playwright-framework",
"devDependencies":{
"@playwright/test":"latest",
"allure-playwright":"latest"
}
}`

                let ci = `name: Playwright Tests

on: [push]

jobs:
test:

runs-on: ubuntu-latest

steps:

- uses: actions/checkout@v3

- uses: actions/setup-node@v3

- run: npm install

- run: npx playwright install

- run: npx playwright test
`

                zip.folder("tests").file("login.spec.ts", test)
                zip.folder("pages").file("LoginPage.ts", page)
                zip.folder(".github/workflows").file("playwright.yml", ci)
                zip.file("playwright.config.ts", config)
                zip.file("package.json", packagejson)

                preview = test

            }

            if (tool === "Playwright" && lang === "JavaScript") {

                let test = `const { test, expect } = require('@playwright/test')

test('Login Test', async ({ page }) => {

await page.goto("${url}")

console.log("${steps}")

})
`

                let packagejson = `{
"name":"playwright-framework",
"devDependencies":{
"@playwright/test":"latest"
}
}`

                zip.folder("tests").file("login.spec.js", test)
                zip.file("package.json", packagejson)

                preview = test

            }

            if (tool === "Selenium" && lang === "Java") {

                let test = `package tests;

import base.BaseTest;
import org.testng.annotations.Test;

public class LoginTest extends BaseTest{

@Test
public void loginTest(){

driver.get("${url}");

System.out.println("${steps}");

}

}`

                let base = `package base;

import org.openqa.selenium.WebDriver;
import org.openqa.selenium.chrome.ChromeDriver;
import org.testng.annotations.AfterMethod;
import org.testng.annotations.BeforeMethod;

public class BaseTest{

public WebDriver driver;

@BeforeMethod
public void setup(){

driver=new ChromeDriver();

}

@AfterMethod
public void teardown(){

driver.quit();

}

}`

                let screenshot = `package utils;

import org.openqa.selenium.OutputType;
import org.openqa.selenium.TakesScreenshot;
import org.openqa.selenium.WebDriver;

public class ScreenshotUtil{

public static void capture(WebDriver driver){

((TakesScreenshot)driver).getScreenshotAs(OutputType.FILE);

}

}`

                let pom = `<project>

<dependencies>

<dependency>
<groupId>org.seleniumhq.selenium</groupId>
<artifactId>selenium-java</artifactId>
<version>4.18.1</version>
</dependency>

<dependency>
<groupId>org.testng</groupId>
<artifactId>testng</artifactId>
<version>7.9.0</version>
</dependency>

</dependencies>

</project>`

                let ci = `name: Selenium Tests

on: [push]

jobs:

test:

runs-on: ubuntu-latest

steps:

- uses: actions/checkout@v3

- name: Setup Java
  uses: actions/setup-java@v3
  with:
    distribution: 'temurin'
    java-version: '17'

- run: mvn test
`

                zip.folder("src/test/java/tests").file("LoginTest.java", test)
                zip.folder("src/test/java/base").file("BaseTest.java", base)
                zip.folder("src/test/java/utils").file("ScreenshotUtil.java", screenshot)
                zip.folder(".github/workflows").file("selenium.yml", ci)
                zip.file("pom.xml", pom)

                preview = test

            }

            if (tool === "Selenium" && lang === "Python") {

                let test = `from selenium import webdriver

driver = webdriver.Chrome()

driver.get("${url}")

print("${steps}")

driver.quit()
`

                let req = `selenium
pytest`

                zip.folder("tests").file("test_login.py", test)
                zip.file("requirements.txt", req)

                preview = test

            }

            document.getElementById("output").textContent = preview

        }

        function downloadZip() {

            zip.generateAsync({ type: "blob" }).then(function (content) {

                let a = document.createElement("a")
                a.href = URL.createObjectURL(content)
                a.download = "qa-automation-framework.zip"
                a.click()

            })

        }

    </script>

</body>

</html>
